spring:
  application:
    name: karar.dev
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:test }
    username: ${DATABASE_USER:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.h2.Driver
  profiles:
    active: ${PROFILE:local}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true


logging:
  pattern:
   console: ${LOG_PATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %red([%thread]) %highlight(%-5level) %yellow(%-40.40logger{39}:%L) - %msg%n}

server:
  port: ${PORT:8080}
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/karadb}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  config:
    activate:
      on-profile: prod

server:
  port: 8080

# ============================================
# PROD Logging — Console (minimal) + File (primary)
# ============================================
logging:
  level:
    root: WARN
    org.karar.dev: INFO
    org.karar.dev.common.audit: INFO
    org.springframework: WARN
    org.hibernate: ERROR
    org.hibernate.SQL: OFF
  # File output — primary log sink in production
  file:
    name: logs/karar-prod.log
  logback:
    rollingpolicy:
      # Her dosya max 100MB
      max-file-size: 100MB
      # Son 50 dosya tutulur
      max-history: 50
      # Toplam disk limiti
      total-size-cap: 2GB
      # Arşiv dosya adı formatı
      file-name-pattern: logs/karar-prod.%d{yyyy-MM-dd}.%i.log
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: ${DATABASE_USER:sa}
    password: ${DATABASE_PASSWORD:}

  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    org.karar.dev: DEBUG
    org.springframework.security: DEBUG
    

app:
  jwt:
    secret: ${JWT_SECRET:localDevSecretKeyThatIsAtLeast32BytesLong!!}
    expiration-time: ${JWT_EXPIRATION:3600000}
    issuer: ${JWT_ISSUER:karar-dev-local}


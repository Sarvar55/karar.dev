spring:
  config:
    activate:
      on-profile: ${ACTIVE_PROFILE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/karardb}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: false


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/seed
    baseline-on-migrate: true
    baseline-version: 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: karar-dev
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.karar.dev.domain.auth.event

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false


# ============================================
# DEV Logging — Console + File
# ============================================
logging:
  level:
    root: INFO
    org.karar.dev: DEBUG
    org.karar.dev.common.audit: DEBUG
    org.karar.dev.common.security: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  # File output
  file:
    name: logs/karar-dev.log
  logback:
    rollingpolicy:
      # Her dosya max 50MB
      max-file-size: 50MB
      # Son 10 dosya tutulur
      max-history: 10
      # Toplam disk limiti
      total-size-cap: 500MB
      # Arşiv dosya adı formatı
      file-name-pattern: logs/karar-dev.%d{yyyy-MM-dd}.%i.log



app:
  jwt:
    secret: ${JWT_SECRET:devSecretKeyThatIsAtLeast32BytesLongForHS256!!}
    access-token-expiration-time: ${JWT_EXPIRATION:3600000}
    refresh-token-expiration-time: ${JWT_REFRESH_EXPIRATION:86400000}
    issuer: ${JWT_ISSUER:karar_dev}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allow-credentials: true
    allowed-methods:
      - "*"
    allowed-headers:
      - "*"
  verification:
    token-ttl-hours: 24
    base-url: ${VERIFICATION_BASE_URL:http://localhost:8080}
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: profile-images
    region: us-east-1
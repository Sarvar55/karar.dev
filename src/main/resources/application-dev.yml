spring:
  config:
    activate:
      on-profile: ${ACTIVE_PROFILE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/karardb}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: false
      

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/seed
    baseline-on-migrate: true
    baseline-version: 1


logging:
  level:
    root: INFO
    org.springframework.security: INFO



app:
  jwt:
    secret: ${JWT_SECRET:devSecretKeyThatIsAtLeast32BytesLongForHS256!!}
    expiration-time: ${JWT_EXPIRATION:3600000}
    issuer: ${JWT_ISSUER:karar_dev}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allow-credentials: true
    allowed-methods:
      - "*"
    allowed-headers:
      - "*"
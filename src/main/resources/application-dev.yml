spring:
  config:
    activate:
      on-profile: ${ACTIVE_PROFILE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/karardb}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: false


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/seed
    baseline-on-migrate: true
    baseline-version: 1


# ============================================
# DEV Logging — Console + File
# ============================================
logging:
  level:
    root: INFO
    org.karar.dev: DEBUG
    org.karar.dev.common.audit: DEBUG
    org.karar.dev.common.security: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  # File output
  file:
    name: logs/karar-dev.log
  logback:
    rollingpolicy:
      # Her dosya max 50MB
      max-file-size: 50MB
      # Son 10 dosya tutulur
      max-history: 10
      # Toplam disk limiti
      total-size-cap: 500MB
      # Arşiv dosya adı formatı
      file-name-pattern: logs/karar-dev.%d{yyyy-MM-dd}.%i.log



app:
  jwt:
    secret: ${JWT_SECRET:devSecretKeyThatIsAtLeast32BytesLongForHS256!!}
    access-token-expiration-time: ${JWT_EXPIRATION:3600000}
    refresh-token-expiration-time: ${JWT_REFRESH_EXPIRATION:86400000}
    issuer: ${JWT_ISSUER:karar_dev}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allow-credentials: true
    allowed-methods:
      - "*"
    allowed-headers:
      - "*"